<script>
function sendPrompt(text) {
  // En contexte Claude, la fonction parent prend le relais
  if (window.parent && window.parent !== window && typeof window.parent.sendPrompt === 'function') {
    window.parent.sendPrompt(text);
  } else {
    console.log('[sendPrompt]', text);
    alert('Prompt : ' + text);
  }
}
